<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>五子棋</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="confetti-canvas"></canvas>

  <!-- ── Welcome modal ──────────────────────────── -->
  <div id="welcome-modal">
    <div class="modal-card">
      <h2 data-i18n="welcomeTitle">欢迎来到五子棋</h2>

      <div id="returning-view" hidden>
        <p id="returning-msg"></p>
        <div class="modal-actions">
          <button id="continue-btn" data-i18n="continueAs">继续</button>
          <button id="new-user-btn" class="ghost" data-i18n="newUser">新建用户</button>
        </div>
      </div>

      <div id="new-user-view">
        <p data-i18n="enterName">请输入你的名字</p>
        <input id="name-input" type="text" maxlength="20"
               data-i18n-ph="namePlaceholder" placeholder="你的名字（最多 20 字符）"
               autocomplete="off" spellcheck="false" />
        <button id="confirm-name-btn" data-i18n="confirm">确认</button>
      </div>
    </div>
  </div>

  <!-- ── Fixed UI chrome ────────────────────────── -->
  <div id="conn-status" class="disconnected">
    <span class="conn-dot"></span>
    <span class="conn-label" data-i18n="disconnected">未连接</span>
  </div>

  <div id="lang-switcher">
    <button id="lang-btn" aria-haspopup="listbox" aria-expanded="false">
      <span id="lang-label">中文</span>
      <span class="lang-arrow">▾</span>
    </button>
    <ul id="lang-menu" role="listbox" hidden>
      <li role="option" data-lang="zh">中文</li>
      <li role="option" data-lang="en">English</li>
      <li role="option" data-lang="ja">日本語</li>
      <li role="option" data-lang="ms">Bahasa Melayu</li>
      <li role="option" data-lang="vi">Tiếng Việt</li>
      <li role="option" data-lang="th">ภาษาไทย</li>
    </ul>
  </div>

  <div id="online-panel">
    <button id="online-toggle">
      <span class="online-dot"></span>
      <span id="online-count">在线 0 人</span>
      <span class="online-arrow">▾</span>
    </button>
    <ul id="online-list" hidden></ul>
  </div>

  <!-- ── Choose opponent modal ─────────────────── -->
  <div id="choose-modal" hidden>
    <div class="modal-card">
      <h2 data-i18n="chooseOpponent">选择对手</h2>
      <ul id="choose-list"></ul>
      <p id="no-idle-msg" hidden data-i18n="noIdlePlayers">暂无空闲玩家</p>
      <button id="close-choose-btn" class="ghost" style="margin-top:14px" data-i18n="cancelChallenge">关闭</button>
    </div>
  </div>

  <!-- ── Incoming challenge notification ────────── -->
  <div id="challenge-notif" hidden>
    <div class="notif-card">
      <p id="notif-msg"></p>
      <div class="notif-actions">
        <button id="accept-btn" data-i18n="accept">接受</button>
        <button id="decline-btn" class="ghost" data-i18n="decline">拒绝</button>
      </div>
    </div>
  </div>

  <!-- ── Main content ───────────────────────────── -->
  <h1>五子棋</h1>

  <div id="user-info" hidden>
    <span id="user-flag"></span>
    <span id="user-name"></span>
  </div>

  <div id="match-btns">
    <button id="random-match-btn" disabled>
      <span class="btn-label" data-i18n="randomMatch">随机匹配</span>
      <span class="spinner" hidden aria-hidden="true"></span>
    </button>
    <button id="challenge-btn" disabled data-i18n="challengePlayer">挑战玩家</button>
    <button id="ai-btn" disabled data-i18n="vsAI">对战电脑</button>
  </div>

  <!-- ── AI difficulty modal ───────────────────────── -->
  <div id="ai-modal" hidden>
    <div class="modal-card">
      <h2 data-i18n="selectDifficulty">选择难度</h2>
      <div class="difficulty-btns">
        <button class="diff-btn" data-diff="easy"   data-i18n="diffEasy">简单</button>
        <button class="diff-btn" data-diff="medium" data-i18n="diffMedium">中等</button>
        <button class="diff-btn" data-diff="hard"   data-i18n="diffHard">困难</button>
      </div>
      <button id="close-ai-modal" class="ghost" style="margin-top:14px" data-i18n="cancelChallenge">取消</button>
    </div>
  </div>

  <button id="cancel-challenge-btn" hidden data-i18n="cancelChallenge">取消挑战</button>

  <p id="status"></p>

  <div id="board-header">
    <div id="my-symbol" hidden></div>
    <button id="undo-btn" hidden data-i18n="undoMove">悔棋</button>
  </div>

  <div id="board"></div>

  <div id="post-game-btns">
    <button id="play-again-btn" hidden data-i18n="playAgain">再来一局</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="i18n.js"></script>
  <script src="client.js"></script>
</body>
</html>
